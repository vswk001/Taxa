<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="48" cy="48" r="8" fill="#ffffff" opacity="0.16"/>
    </pattern>
  </defs>

  <!-- background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- subtle dot matrix = classification / order field -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#dots)"/>

  <!-- clean bold T (name) -->
  <g fill="#ffffff">
    <rect x="300" y="312" width="424" height="96" rx="48"/>
    <rect x="464" y="312" width="96" height="408" rx="48"/>
  </g>
</svg>
